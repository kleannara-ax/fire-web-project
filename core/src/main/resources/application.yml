spring:
  messages:
    encoding: UTF-8
  application:
    name: fireweb

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:platform_db}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:platform_user}
    password: ${DB_PASSWORD:Kleannara12#}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: FireWebHikariPool
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  sql:
    init:
      mode: always

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000

logging:
  level:
    root: INFO
    com.company: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/fireweb.log
    max-size: 10MB
    max-history: 14

fireweb:
  cors:
    allowed-origins: []
  upload:
    base-path: ${UPLOAD_BASE_PATH:/data/upload/module_fire}
    extinguishers: ${UPLOAD_BASE_PATH:/data/upload/module_fire}/extinguishers
    hydrants: ${UPLOAD_BASE_PATH:/data/upload/module_fire}/hydrants
    inspections: ${UPLOAD_BASE_PATH:/data/upload/module_fire}/inspections
