<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FireWeb - 로그인</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 50%, #FFA94D 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .login-logo {
      max-width: 260px;
      max-height: 120px;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      margin: 0 auto 10px auto;
    }
    .login-container { width: 100%; max-width: 450px; padding: 20px; }
    .login-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 50px 40px;
      backdrop-filter: blur(10px);
    }
    .form-label { color: #333; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
    .form-control {
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
    }
    .form-control:focus {
      border-color: #FF6B6B;
      box-shadow: 0 0 0 0.2rem rgba(255, 107, 107, 0.15);
    }
    .input-group-text {
      background: transparent;
      border: 2px solid #e0e0e0;
      border-right: none;
      border-radius: 10px 0 0 10px;
      color: #999;
    }
    .input-group .form-control { border-left: none; border-radius: 0 10px 10px 0; }
    .input-group:focus-within .input-group-text { border-color: #FF6B6B; color: #FF6B6B; }
    .btn-login {
      background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      width: 100%;
    }
    .alert-danger {
      border-radius: 10px;
      border: none;
      background: #FFE5E5;
      color: #D32F2F;
      padding: 12px 16px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="text-center mb-4">
        <img src="/images/logo.png" alt="로고" class="login-logo" />
      </div>

      <div id="errorAlert" class="alert alert-danger" role="alert" style="display:none;">
        <strong><i class="bi bi-exclamation-triangle-fill me-2"></i>로그인 실패</strong><br />
        <span id="errorMessage"></span>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label"><i class="bi bi-person-fill me-2"></i>사용자명</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="username" placeholder="아이디를 입력하세요" required autofocus />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label"><i class="bi bi-lock-fill me-2"></i>비밀번호</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="비밀번호를 입력하세요" required />
          </div>
        </div>

        <button type="submit" class="btn btn-login" id="loginBtn">
          <i class="bi bi-box-arrow-in-right me-2"></i>로그인
        </button>
      </form>
    </div>
  </div>

  <script src="/js/csrf.js"></script>
  <script>
    function setAuth(userObj) {
      const userJson = JSON.stringify(userObj);
      localStorage.setItem('fireweb_user', userJson);
      localStorage.setItem('fw_user', userObj.displayName || userObj.username || '');
    }

    function showError(msg) {
      document.getElementById('errorMessage').textContent = msg || '로그인에 실패했습니다.';
      document.getElementById('errorAlert').style.display = '';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('errorAlert').style.display = 'none';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;

      try {
        await window.FireWebCsrf?.ensureToken?.();
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: window.FireWebCsrf?.headers({ 'Content-Type': 'application/json' }, 'POST') || { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const json = await res.json();

        if (json.ok && json.data) {
          setAuth({
            username: json.data.username || username,
            displayName: json.data.displayName || username,
            role: json.data.role || 'USER'
          });
          const requested = new URLSearchParams(window.location.search).get('returnUrl') || '/';
          const allowed =
            requested === '/' ||
            requested === '/index.html' ||
            requested === '/extinguishers.html' ||
            requested === '/hydrants.html' ||
            requested === '/receivers.html' ||
            requested === '/pumps.html' ||
            requested.startsWith('/maps/') ||
            requested === '/qr' ||
            requested.startsWith('/qr/') ||
            requested.startsWith('/m/') ||
            requested.startsWith('/minspection/');
          const returnUrl = allowed ? requested : '/';
          window.location.href = returnUrl;
          return;
        }

        showError(json.message || '아이디 또는 비밀번호가 올바르지 않습니다.');
      } catch (err) {
        showError('서버 연결에 실패했습니다.');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
