<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>점검 완료 - FireWeb</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --border: rgba(0,0,0,.12);
      --radius: 14px;
      --shadow: 0 4px 16px rgba(0,0,0,.10);
      --muted: #6b7280;
      --primary: #667eea;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f3f4f6;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .mi-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 24px;
      text-align: center;
      width: 100%;
      max-width: 400px;
    }
    .emoji { font-size: 56px; }
    .mi-title { font-weight: 900; font-size: 20px; margin-top: 12px; }
    .mi-sub { font-size: 14px; color: var(--muted); margin-top: 6px; }
    .mi-cta { margin-top: 20px; }
    .btn-close-page {
      padding: 13px 36px;
      background: var(--primary);
      color: #fff;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }
    .btn-close-page:hover { opacity: .9; }
  </style>
</head>
<body>
  <div class="mi-card">
    <div class="emoji">✅</div>
    <div class="mi-title">점검이 완료되었습니다!</div>
    <div class="mi-sub">창을 닫아주세요.</div>
    <div class="mi-cta">
      <button class="btn-close-page" onclick="closeCurrentWindow()">닫기</button>
    </div>
  </div>
  <script>
    window.closeCurrentWindow = function () {
      try { if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage('close'); } catch {}
      try { if (window.webkit?.messageHandlers?.closeWindow) window.webkit.messageHandlers.closeWindow.postMessage('close'); } catch {}
      try { window.open('', '_self'); } catch {}
      try { window.close(); } catch {}
      setTimeout(() => {
        try { window.location.replace('about:blank'); } catch {}
      }, 150);
    };
  </script>
</body>
</html>
