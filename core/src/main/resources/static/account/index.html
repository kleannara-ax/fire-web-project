<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계정 - 내 정보</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f5f7fa; margin:0; }
    .acct-wrap { display:flex; gap:12px; padding:12px; }
    .acct-left { width:260px; background:#fff; border:1px solid #e5e5e5; border-radius:12px; padding:12px; }
    .acct-right { flex:1; background:#fff; border:1px solid #e5e5e5; border-radius:12px; padding:12px; }
    .acct-menu a { display:block; padding:10px 12px; border-radius:10px; text-decoration:none; color:#222; }
    .acct-menu a.active { background:#f1f3f5; font-weight:700; }
  </style>
</head>
<body>
<header>
  <nav class="navbar navbar-expand-lg navbar-dark fireweb-navbar" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/index.html">
        <span class="brand-logos" aria-hidden="true">
          <img src="/images/Kleannara.PNG" alt="" style="height:32px" onerror="this.style.display='none'">
          <img src="/images/KFMS.PNG" alt="" style="height:32px" onerror="this.style.display='none'">
        </span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="topNav">
        <ul class="navbar-nav ms-3">
          <li class="nav-item"><a class="nav-link fw-semibold" href="/extinguishers.html">소화기 목록</a></li>
          <li class="nav-item"><a class="nav-link fw-semibold" href="/hydrants.html">소화전 목록</a></li>
          <li class="nav-item"><a class="nav-link fw-semibold" href="/maps/floor.html?buildingName=%EB%B3%B5%EC%A7%80%EA%B4%80&floorName=1%EC%B8%B5">도면</a></li>
          <li class="nav-item"><a class="nav-link fw-semibold" href="/qr">QR코드</a></li>
        </ul>
        <ul class="navbar-nav ms-auto align-items-center" id="navAccountArea"></ul>
      </div>
    </div>
  </nav>
</header>

<main class="acct-wrap">
  <section class="acct-left">
    <div class="fw-bold mb-2">계정</div>
    <div class="acct-menu">
      <a class="active" href="/account/index.html">내 정보</a>
      <a id="usersMenu" href="/account/users.html" style="display:none;">계정관리</a>
    </div>
  </section>

  <section class="acct-right">
    <h4 class="mb-3">내 정보</h4>
    <div id="msg"></div>

    <div class="mb-4">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">아이디</label>
          <input class="form-control" id="username" readonly />
        </div>
        <div class="col-md-4">
          <label class="form-label">사용자명</label>
          <input class="form-control" id="displayName" readonly />
        </div>
        <div class="col-md-4">
          <label class="form-label">권한</label>
          <input class="form-control" id="role" readonly />
        </div>
      </div>
    </div>

    <hr class="my-4" />
    <h5 class="mb-3">비밀번호 변경</h5>
    <form id="pwForm">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">현재 비밀번호</label>
          <input class="form-control" type="password" id="currentPassword" required />
        </div>
        <div class="col-md-4">
          <label class="form-label">새 비밀번호</label>
          <input class="form-control" type="password" id="newPassword" required />
        </div>
        <div class="col-md-4">
          <label class="form-label">새 비밀번호 확인</label>
          <input class="form-control" type="password" id="confirmPassword" required />
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-primary" type="submit">비밀번호 변경</button>
      </div>
    </form>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/csrf.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('fireweb_user') || 'null');
  if (!user) location.href = '/login.html?returnUrl=' + encodeURIComponent(location.pathname + location.search);

  function showMsg(text, type) {
    document.getElementById('msg').innerHTML = text ? `<div class="alert alert-${type}">${text}</div>` : '';
  }

  async function api(url, opt = {}) {
    const requestOpt = { ...opt };
    if (window.FireWebCsrf?.isMutation?.(requestOpt.method)) {
      await window.FireWebCsrf.ensureToken();
    }
    const headers = { ...(requestOpt.headers || {}) };
    if (requestOpt.body && typeof requestOpt.body === 'object' && !(requestOpt.body instanceof FormData)) {
      headers['Content-Type'] = 'application/json';
      requestOpt.body = JSON.stringify(requestOpt.body);
    }
    requestOpt.headers = window.FireWebCsrf?.headers(headers, requestOpt.method) || headers;
    const res = await fetch(url, requestOpt);
    if (res.status === 401) {
      localStorage.removeItem('fireweb_user');
      localStorage.removeItem('fw_user');
      location.href = '/login.html?returnUrl=' + encodeURIComponent(location.pathname + location.search);
      return null;
    }
    return res;
  }

  async function loadMe() {
    const r = await api('/api/auth/me');
    if (!r || !r.ok) {
      showMsg('내 정보 조회에 실패했습니다.', 'danger');
      return;
    }
    const j = await r.json();
    const d = j?.data || {};
    document.getElementById('username').value = d.username || '-';
    document.getElementById('displayName').value = d.displayName || '-';
    document.getElementById('role').value = d.role || '-';
  }

  document.getElementById('pwForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    showMsg('', 'success');
    const body = {
      currentPassword: document.getElementById('currentPassword').value,
      newPassword: document.getElementById('newPassword').value,
      confirmPassword: document.getElementById('confirmPassword').value
    };
    const r = await api('/api/auth/change-password', { method: 'POST', body });
    if (!r || !r.ok) {
      const t = await r?.text().catch(() => '');
      showMsg(t || '비밀번호 변경에 실패했습니다.', 'danger');
      return;
    }
    showMsg('비밀번호가 변경되었습니다.', 'success');
    document.getElementById('pwForm').reset();
  });

  if ((user?.role || '').toUpperCase() === 'ADMIN') {
    document.getElementById('usersMenu').style.display = '';
  }
  loadMe();
</script>
<script src="/js/common-nav.js"></script>
</body>
</html>
